{% load static %}

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>BeONE Web App</title>
    <link rel="stylesheet" type="text/css" href="{% static 'main/index.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'main/App.css' %}">
  </head>
  <body>
    <div class='baseline-row pane'>
        <div class='column'>
          <h1><a href="/">BeONE Web App</a></h1>
        </div>
        {% if request.user.is_authenticated %}
          <div class='column'>
            <nav>
              <span class="rspace"><a href="/">Sample List</a></span>
              <span class="rspace"><a href="/">Data Sets</a></span>
              <span class="rspace"><a href="/">Dashboard</a></span>
            <nav>
          </div>
          <div class='right-justify'>
            <span>Hello {{request.user.username}}</span>
            <span><a href=" {% url 'logout' %}">Logout</a></span>
            <div class='right-justify'>
              <span>Current species:</span>
              <span><a href=" {% url 'select_species' %}">{{ species_name }}</a></span>
            </div>
          {% else %}
            <span>Please <a href=" {% url 'login' %}">login</a></span>
          {% endif %}
        </div>
    </div>
    {% block content %}
    {% endblock %}
  </body>
</html>
